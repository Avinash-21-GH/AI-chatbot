<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HITAM Chatbot</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f2fdf2;
    }
    nav {
      background-color: #1e7e1e;
      color: white;
      padding: 10px 0;
    }
    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      margin: 0;
      padding: 0;
      flex-wrap: wrap;
    }
    nav li {
      margin: 0 15px;
    }
    nav a {
      color: white;
      text-decoration: none;
    }
    header img {
      width: 100%;
      height: auto;
      display: block;
    }
    section {
      padding: 20px;
      background-color: #ffffff;
    }
    section img {
      width: 100%;
      max-width: 1200px;
      display: block;
      margin: 0 auto;
    }
    .chatbot {
      position: fixed;
      bottom: 20px;
      right: 20px;
    }
    .chat-window {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: white;
      border: 1px solid #ccc;
      width: 320px;
      height: 500px;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
    }
    #chatLog {
      flex-grow: 1;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .chat-msg {
      margin: 5px 0;
    }
    .chat-msg b {
      color: #228B22;
    }
    .input-area {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .input-area input {
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .input-area button {
      background: #228B22;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 5px;
      cursor: pointer;
    }
    .input-area button:hover {
      background: #1e7e1e;
    }
  </style>
</head>
<body>

<nav>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About Us</a></li>
    <li><a href="#">Admissions</a></li>
    <li><a href="#">Academics</a></li>
    <li><a href="#">Collaborations</a></li>
    <li><a href="#">Placements</a></li>
    <li><a href="#">R&amp;D</a></li>
    <li><a href="#">Campus Life</a></li>
    <li><a href="#">Contact Us</a></li>
  </ul>
</nav>

<header>
  <img src="/static/Hitam-Header-2.png" alt="HITAM Banner">
</header>

<section>
  <img src="/static/hitam-features.png" alt="HITAM Highlights">
</section>

<div class="chatbot">
  <button onclick="toggleChat()" style="font-size: 24px; border-radius: 50%; background: #228B22; color: white; border: none; padding: 10px 15px;">🤖</button>
</div>

<div class="chat-window" id="chatWindow">
  <div id="chatLog"></div>
  <div class="input-area">
    <input type="email" id="emailInput" placeholder="Enter Gmail before chatting">
    <input type="text" id="userInput" placeholder="Ask me anything...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let greeted = false;

function toggleChat() {
  const chat = document.getElementById("chatWindow");
  chat.style.display = chat.style.display === "none" || chat.style.display === "" ? "flex" : "none";

  if (!greeted) {
    const log = document.getElementById("chatLog");
    log.innerHTML += `<div class="chat-msg"><b>Bot:</b> Hello! How can I help you with HITAM College information today?</div>`;
    greeted = true;
  }

  const savedEmail = localStorage.getItem("userEmail");
  if (savedEmail) {
    document.getElementById("emailInput").value = savedEmail;
    document.getElementById("emailInput").style.display = "none";
  }
}

async function sendMessage() {
  const msgInput = document.getElementById("userInput");
  const emailInput = document.getElementById("emailInput");
  const msg = msgInput.value.trim();
  let email = emailInput.value.trim();

  if (!msg) return;

  if (!email) {
    alert("Please enter a Gmail address first.");
    return;
  }

  localStorage.setItem("userEmail", email);
  emailInput.style.display = "none";

  const log = document.getElementById("chatLog");
  log.innerHTML += `<div class="chat-msg"><b>You:</b> ${msg}</div>`;
  msgInput.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg, email: email })
  });

  const data = await res.json();
  log.innerHTML += `<div class="chat-msg"><b>Bot:</b> ${data.response}</div>`;
  log.scrollTop = log.scrollHeight;
}
</script>

</body>
</html>
